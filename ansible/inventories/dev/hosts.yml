---
# ==============================================================================
# 🧪 Ansible Development Inventory
# ==============================================================================
# 📝 NOTES:
# - Target Host: 10.3.0.11 (Nested PVE)
# - Container IPs: 10.3.99.x (Defined by network_prefix in group_vars/all.yml)
# ==============================================================================

all:
  children:
    proxmox_host:
      hosts:
        dev_pve_host:
          ansible_host: "10.3.0.11"

    lxc_containers:
      vars:
        ansible_user: root
        ansible_become: yes
      children:
        # 1. Gateway
        network:
          hosts:
            lxc-101:
              ansible_host: "{{ network_prefix }}.101"
              role: "traefik"

        # 2. Media
        media:
          hosts:
            lxc-102:
              ansible_host: "{{ network_prefix }}.102"
              role: "jellyfin"

        # 3. Automation
        servarr:
          hosts:
            lxc-103:
              ansible_host: "{{ network_prefix }}.103"
              role: "automation"

        # 4. Downloads
        downloads:
          hosts:
            lxc-104:
              ansible_host: "{{ network_prefix }}.104"
              role: "deluge"

        # 5. Home
        home:
          hosts:
            lxc-105:
              ansible_host: "{{ network_prefix }}.105"
              role: "homeassistant"
