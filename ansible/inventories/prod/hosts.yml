---
# ==============================================================================
# 📋 Ansible Production Inventory
# ==============================================================================
# 📝 HOW TO EDIT THIS FILE:
# 1. This file maps LXC IDs to Ansible Roles.
# 2. The 'ansible_host' is dynamically constructed using the 'network_prefix'
#    variable defined in 'group_vars/all.yml' (Default: 10.3.1).
# 3. To add a new service:
#    a. Define it in 'group_vars/all.yml' under 'managed_lxcs' (for documentation).
#    b. Add a new entry below under the appropriate group (e.g., 'media', 'home').
#    c. Set the ID (e.g., lxc-106) and Role.
#
# ⚠️ IMPORTANT:
# - The LXC ID (e.g., 101) MUST match the ID used in Proxmox.
# - The IP address is automatically derived: {{ network_prefix }}.{ID}
# ==============================================================================

all:
  children:
    proxmox_host:
      hosts:
        pve_host:
          ansible_host: "10.3.0.5"

    lxc_containers:
      vars:
        # Global variable to define the user for all LXCs
        ansible_user: root
        ansible_become: yes
      children:
        # 1. Gateway & Proxy
        network:
          hosts:
            lxc-101:
              ansible_host: "{{ network_prefix }}.101"
              role: "traefik"

        # 2. Media Streaming
        media:
          hosts:
            lxc-102:
              ansible_host: "{{ network_prefix }}.102"
              role: "jellyfin"

        # 3. Automation Stack (Radarr, Sonarr, etc.)
        servarr:
          hosts:
            lxc-103:
              ansible_host: "{{ network_prefix }}.103"
              role: "automation"

        # 4. Download Client
        downloads:
          hosts:
            lxc-104:
              ansible_host: "{{ network_prefix }}.104"
              role: "deluge"

        # 5. Smart Home
        home:
          hosts:
            lxc-105:
              ansible_host: "{{ network_prefix }}.105"
              role: "homeassistant"

