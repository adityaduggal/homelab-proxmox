---
# ==============================================================================
# 🎬 Jellyfin Media Server Deployment (with Hardware Acceleration)
# ==============================================================================

- name: 📁 Create Jellyfin config and media directories
  file:
    path: "{{ item }}"
    state: directory
    owner: homelab
    group: homelab
  loop:
    - "/etc/jellyfin"
    - "/mnt/media"

# --- GPU/QuickSync Permissions ---
- name: 👥 Ensure 'render' and 'video' groups have correct permissions
  group:
    name: "{{ item }}"
    state: present
  loop: ["render", "video"]

- name: 👤 Add 'homelab' user to hardware groups
  user:
    name: homelab
    groups: "render,video"
    append: yes

- name: 🐳 Deploy Jellyfin Container
  docker_container:
    name: jellyfin
    image: jellyfin/jellyfin:latest
    restart_policy: unless-stopped
    network_mode: host
    user: "1000:1000" # homelab user UID/GID
    # Mount hardware devices for transcoding
    devices:
      - "/dev/dri/renderD128:/dev/dri/renderD128"
      - "/dev/dri/card0:/dev/dri/card0"
    volumes:
      - "/etc/jellyfin:/config"
      - "/mnt/media:/data"
    labels:
      # 🚏 Traefik labels for reverse proxying
      traefik.enable: "true"
      traefik.http.routers.jellyfin.rule: "Host(`jellyfin.{{ domain_name }}`) || Host(`media.{{ domain_name }}`)"
      traefik.http.routers.jellyfin.entrypoints: "websecure"
      traefik.http.routers.jellyfin.tls.certresolver: "letsencrypt"
      traefik.http.services.jellyfin.loadbalancer.server.port: "8096"
